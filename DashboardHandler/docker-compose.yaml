services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - serge-external-network
  serge-dashboard-handler:
    build: 
      context: .
      dockerfile: Containerfile
    container_name: serge-dashboard-handler
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - serge-external-network

networks:
  serge-external-network:
    external: true